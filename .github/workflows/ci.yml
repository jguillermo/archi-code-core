name: CI

on:
  pull_request:
    branches: [main, release]

jobs:
  test:
    name: Test all packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build packages in dependency order
        run: npm run build

      - name: Run tests
        run: npm run test
