[package]
name = "archi-validation"
version = "0.1.0"
edition = "2021"
description = "WebAssembly validation library for @archi-code/validation"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]
name = "archi_validation"

[features]
default = []
wasm = ["wasm-bindgen", "console_error_panic_hook", "js-sys"]

[dependencies]
# WASM bindings — optional so the lib compiles without wasm target too (useful for native tests)
wasm-bindgen = { version = "0.2", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }
js-sys = { version = "0.3", optional = true }

# Validation
validator = { version = "0.19", features = ["derive"] }

# UUID parsing/validation (1.6+ required for Version::SortRand / UUID v7)
# js feature required for wasm32 target (uses wasm-bindgen for random)
uuid = { version = "1.6", features = ["v4", "v7", "js"] }

# URL parsing/validation
url = "2"

# Date/datetime parsing (no `clock` feature — not available in WASM, not needed for parsing)
chrono = { version = "0.4", default-features = false, features = ["std"] }

# Regex (for hex color, etc.) + lazy static initialization
regex = "1"
once_cell = "1"

# Semantic versioning validation
semver = "1"

# JSON validation + serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# getrandom needs the wasm_js feature to access Web Crypto API when targeting wasm32
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.4", features = ["wasm_js"] }

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[profile.release]
# Optimize for size — important for WASM binary size
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
